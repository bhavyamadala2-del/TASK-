<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Lookup</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #7c6af7;
      --accent2:  #a78bfa;
      --text:     #e8e9f0;
      --muted:    #6b7280;
      --success:  #34d399;
      --error:    #f87171;
      --radius:   14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 12px;
    }

    header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
      background: linear-gradient(135deg, #e8e9f0 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.18);
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover  { background: var(--accent2); }
    button:active { transform: scale(0.97); }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Loading skeleton ── */
    .loading-bar {
      display: none;
      margin-top: 28px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .loading-bar.active { display: block; }

    .loading-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      animation: slide 1s ease-in-out infinite;
      border-radius: 2px;
    }

    @keyframes slide {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    /* ── Result area ── */
    #result {
      margin-top: 28px;
    }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--error);
      font-size: 14px;
      padding: 12px 14px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.22);
      border-radius: 8px;
    }

    .product-card {
      animation: fadeUp 0.3s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-image-wrap {
      background: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      height: 200px;
      margin-bottom: 20px;
    }

    .product-image-wrap img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    .product-category {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 6px;
    }

    .product-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .product-price {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--success);
      margin-bottom: 12px;
    }

    .product-description {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .stars {
      color: #fbbf24;
      letter-spacing: 1px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
      font-family: 'DM Mono', monospace;
    }

    .hint span {
      color: var(--accent2);
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Fake Store API</p>
    <h1>Product Lookup</h1>
    <p>Enter a product number to see its details</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="productInput" placeholder="e.g. 3" autocomplete="off" />
      <button id="showButton" disabled>Look up</button>
    </div>

    <div class="loading-bar" id="loadingBar"></div>

    <div id="result"></div>
    <p class="hint" id="hint">Loading catalogue…</p>
  </div>

  <script>
    const productInput = document.getElementById('productInput');
    const showButton   = document.getElementById('showButton');
    const result       = document.getElementById('result');      // ✅ fixed: getElementById (capital I)
    const loadingBar   = document.getElementById('loadingBar');
    const hint         = document.getElementById('hint');

    let products = [];

    /* ── Helpers ── */
    function starsFor(rate) {
      const full  = Math.round(rate);
      return '★'.repeat(full) + '☆'.repeat(5 - full);
    }

    function showError(msg) {
      result.innerHTML = `<div class="error-msg">⚠ ${msg}</div>`;
    }

    /* ── Load products on page load ── */
    async function loadProducts() {                              // ✅ fixed: lowercase 'l'
      loadingBar.classList.add('active');
      try {
        const response = await fetch('https://fakestoreapi.com/products');
        if (!response.ok) throw new Error('Unable to fetch products');
        products = await response.json();
        hint.innerHTML = `Products <span>1 – ${products.length}</span> available`;
        showButton.disabled = false;
      } catch (error) {
        console.error(error);
        hint.textContent = 'Could not load catalogue. Check your connection.';
      } finally {
        loadingBar.classList.remove('active');
      }
    }

    /* ── Show product ── */
    function showProduct() {
      const number = Number(productInput.value);

      if (!Number.isInteger(number) || number < 1 || number > products.length) { // ✅ fixed: .length not .Length
        showError(`Enter a number between 1 and ${products.length}.`);
        return;
      }

      const p = products[number - 1];

      result.innerHTML = `
        <div class="divider"></div>
        <div class="product-card">
          <div class="product-image-wrap">
            <img src="${p.image}" alt="${p.title}" />
          </div>
          <p class="product-category">${p.category}</p>
          <p class="product-title">${p.title}</p>
          <p class="product-price">$${p.price.toFixed(2)}</p>
          <p class="product-description">${p.description}</p>
          <div class="product-rating">
            <span class="stars">${starsFor(p.rating.rate)}</span>
            ${p.rating.rate} · ${p.rating.count} reviews
          </div>
        </div>`;
    }

    /* ── Event listeners ── */
    showButton.addEventListener('click', showProduct);
    productInput.addEventListener('keydown', e => { if (e.key === 'Enter') showProduct(); });

    loadProducts(); // ✅ fixed: actually call the function
  </script>
</body>
</html>
