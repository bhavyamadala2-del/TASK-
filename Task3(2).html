<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Battle Arena</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080C18;
      --surface:   #111827;
      --card:      #151d2e;
      --border:    rgba(255,255,255,0.07);
      --gold:      #FFD700;
      --red:       #FF4455;
      --blue:      #4488FF;
      --text:      #EEF2FF;
      --muted:     #7B8DB0;
      --radius:    16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px 60px;
      /* subtle radial spotlight */
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(68,136,255,0.12) 0%, transparent 70%);
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-eyebrow {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .header h1 {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #b8c9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-sub {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* ── INPUT ROW ── */
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 44px;
      flex-wrap: wrap;
    }

    .controls input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 13px 18px;
      width: 260px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .controls input::placeholder { color: var(--muted); }
    .controls input:focus {
      border-color: rgba(68,136,255,0.6);
      box-shadow: 0 0 0 3px rgba(68,136,255,0.12);
    }

    .controls button {
      background: linear-gradient(135deg, #4488FF, #2255CC);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 13px 26px;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(68,136,255,0.35);
    }
    .controls button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(68,136,255,0.45);
    }
    .controls button:active { transform: translateY(0); }

    /* ── BATTLEFIELD ── */
    .battlefield {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: center;
      max-width: 860px;
      margin: 0 auto 32px;
    }

    /* ── POKEMON CARD ── */
    .pokemon-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px 24px;
      text-align: center;
      transition: box-shadow 0.4s, border-color 0.4s;
      position: relative;
      overflow: hidden;
    }

    /* subtle inner top glow line */
    .pokemon-box::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      border-radius: 999px;
    }

    .pokemon-box.left::before  { background: linear-gradient(90deg, transparent, var(--red), transparent); }
    .pokemon-box.right::before { background: linear-gradient(90deg, transparent, var(--blue), transparent); }

    .pokemon-box.winner {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold), 0 0 40px rgba(255,215,0,0.25);
      animation: winPulse 1.6s ease-in-out infinite alternate;
    }
    .pokemon-box.loser {
      opacity: 0.45;
      filter: grayscale(0.6);
    }

    @keyframes winPulse {
      from { box-shadow: 0 0 0 1px var(--gold), 0 0 24px rgba(255,215,0,0.2); }
      to   { box-shadow: 0 0 0 1px var(--gold), 0 0 48px rgba(255,215,0,0.4); }
    }

    .side-label {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .left  .side-label { color: var(--red); }
    .right .side-label { color: var(--blue); }

    .pokemon-name {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      min-height: 1.6em;
      color: var(--text);
      margin-bottom: 14px;
    }

    .pokemon-img-wrap {
      width: 140px;
      height: 140px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .left  .pokemon-img-wrap { box-shadow: 0 0 30px rgba(255,68,85,0.15); }
    .right .pokemon-img-wrap { box-shadow: 0 0 30px rgba(68,136,255,0.15); }

    .pokemon-img-wrap img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    /* placeholder ghost */
    .pokemon-img-wrap img[src=""] {
      opacity: 0;
    }

    .move-badge {
      display: inline-block;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: capitalize;
    }

    /* ── VS BADGE ── */
    .vs-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .vs-icon {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,0.6);
      animation: vsPulse 2s ease-in-out infinite;
    }

    @keyframes vsPulse {
      0%, 100% { text-shadow: 0 0 12px rgba(255,215,0,0.5); }
      50%       { text-shadow: 0 0 28px rgba(255,215,0,0.9); }
    }

    .vs-bolt {
      font-size: 1rem;
      animation: vsPulse 2s ease-in-out infinite;
      animation-delay: 0.3s;
    }

    /* ── RESULT ── */
    .result-bar {
      max-width: 860px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 28px;
      text-align: center;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .result-bar.win  { border-color: rgba(255,215,0,0.5); box-shadow: 0 0 30px rgba(255,215,0,0.1); }
    .result-bar.lose { border-color: rgba(255,68,85,0.4); }
    .result-bar.tie  { border-color: rgba(100,200,100,0.4); }

    #result {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.25rem);
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .result-bar.win  #result { color: var(--gold); }
    .result-bar.lose #result { color: #FF8090; }
    .result-bar.tie  #result { color: #86EFAC; }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .battlefield {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
      .vs-badge { flex-direction: row; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <div class="header">
    <p class="header-eyebrow">⚡ Choose your fighter</p>
    <h1>Battle Arena</h1>
    <p class="header-sub">Enter a Pokémon name to start the battle</p>
  </div>

  <div class="controls">
    <input id="pokemonInput" placeholder="e.g. charizard, pikachu…" autocomplete="off" spellcheck="false" />
    <button id="chooseBtn">Battle!</button>
  </div>

  <div class="battlefield">
    <div class="pokemon-box left" id="leftCard">
      <p class="side-label">You</p>
      <div class="pokemon-name" id="leftName">—</div>
      <div class="pokemon-img-wrap">
        <img id="leftImg" src="" alt="Your Pokémon">
      </div>
      <span class="move-badge" id="leftMove">Attack: —</span>
      <div class="spinner" id="leftSpinner"></div>
    </div>

    <div class="vs-badge">
      <span class="vs-bolt">⚡</span>
      <span class="vs-icon">VS</span>
      <span class="vs-bolt">⚡</span>
    </div>

    <div class="pokemon-box right" id="rightCard">
      <p class="side-label">Computer</p>
      <div class="pokemon-name" id="rightName">—</div>
      <div class="pokemon-img-wrap">
        <img id="rightImg" src="" alt="Computer Pokémon">
      </div>
      <span class="move-badge" id="rightMove">Attack: —</span>
      <div class="spinner" id="rightSpinner"></div>
    </div>
  </div>

  <div class="result-bar" id="resultBar">
    <p id="result">Ready for battle</p>
  </div>

  <script>
    const chooseBtn     = document.getElementById('chooseBtn');
    const pokemonInput  = document.getElementById('pokemonInput');
    const result        = document.getElementById('result');
    const resultBar     = document.getElementById('resultBar');
    const leftCard      = document.getElementById('leftCard');
    const rightCard     = document.getElementById('rightCard');

    chooseBtn.addEventListener('click', () => {
      const name = pokemonInput.value.trim().toLowerCase();
      if (!name) { setResult('Please enter a Pokémon name first.', ''); return; }
      startBattle(name);
    });

    pokemonInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') chooseBtn.click();
    });

    function resetCards() {
      [leftCard, rightCard].forEach(c => {
        c.classList.remove('winner', 'loser');
      });
      resultBar.classList.remove('win', 'lose', 'tie');
    }

    function setSpinner(side, on) {
      document.getElementById(`${side}Spinner`).classList.toggle('active', on);
    }

    function setResult(text, state) {
      result.textContent = text;
      resultBar.classList.remove('win', 'lose', 'tie');
      if (state) resultBar.classList.add(state);
    }

    async function startBattle(name) {
      resetCards();
      setResult('Loading…', '');
      chooseBtn.disabled = true;

      try {
        setSpinner('left', true);
        const pRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        if (!pRes.ok) throw new Error('not found');
        const playerData = await pRes.json();
        setSpinner('left', false);

        setSpinner('right', true);
        const playerPow = await fillCard('left', playerData);
        const { data: cpuData, movePower: cpuPow } = await loadCPU();
        setSpinner('right', false);

        showResult(playerData, playerPow, cpuData, cpuPow);
      } catch {
        setSpinner('left', false);
        setSpinner('right', false);
        setResult('Pokémon not found — try a different name.', '');
      } finally {
        chooseBtn.disabled = false;
      }
    }

    async function loadCPU() {
      const id   = Math.floor(Math.random() * 1020) + 1;
      const res  = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      const data = await res.json();
      const movePower = await fillCard('right', data);
      return { data, movePower };
    }

    async function fillCard(side, data) {
      const move = await getBestMove(data);
      document.getElementById(`${side}Name`).textContent = data.name.toUpperCase();
      document.getElementById(`${side}Img`).src = data.sprites.front_default;
      document.getElementById(`${side}Move`).textContent = `⚔ ${move.name}`;
      return move.power;
    }

    async function getBestMove(data) {
      const moves = data.moves.slice(0, 12);
      let best = { name: 'tackle', power: 0 };
      for (const entry of moves) {
        try {
          const r = await fetch(entry.move.url);
          if (!r.ok) continue;
          const m = await r.json();
          if (m.power && m.power > best.power) {
            best = { name: m.name.replace(/-/g, ' '), power: m.power };
          }
        } catch { /* skip */ }
      }
      const label = best.power > 0
        ? `${best.name} (${best.power})`
        : `${data.moves[0]?.move.name.replace(/-/g, ' ') || 'tackle'} (0)`;
      return { name: label, power: best.power };
    }

    function showResult(playerData, playerPow, cpuData, cpuPow) {
      const p = playerData.name.toUpperCase();
      const c = cpuData.name.toUpperCase();
      if (playerPow > cpuPow) {
        setResult(`🏆 ${p} wins! (${playerPow} vs ${cpuPow})`, 'win');
        leftCard.classList.add('winner');
        rightCard.classList.add('loser');
      } else if (playerPow < cpuPow) {
        setResult(`💀 ${c} wins! (${cpuPow} vs ${playerPow})`, 'lose');
        rightCard.classList.add('winner');
        leftCard.classList.add('loser');
      } else {
        setResult(`🤝 It's a tie! Both deal ${playerPow} damage.`, 'tie');
      }
    }
  </script>
</body>
</html>
</html>
