<!DOCTYPE html>
<html>
<head>
    <title>Random Joke</title>
</head>
<body>

    <button onclick="getJoke()">Get Random Joke</button>

    <div id="result"></div>

    <script>
        async function getJoke() {
            const resultDiv = document.getElementById("result");

            try {
                const response = await fetch(
                    "https://v2.jokeapi.dev/joke/Any?blacklistFlags=nsfw,racist,sexist"
                );

                const joke = await response.json();

                if (joke.type === "single") {
                    resultDiv.innerHTML = `
                        <p>${joke.joke}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3>${joke.setup}</h3>
                        <p>${joke.delivery}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = "<p>Error fetching joke.</p>";
            }
        }
    </script>

</body>
</html>
